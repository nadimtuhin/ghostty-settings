name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: |
          bash -n ghostty-settings.sh
          bash -n lib/helpers.sh
          bash -n install.sh

      - name: Install bats-core
        run: |
          sudo apt-get install -y bats

      - name: Run tests
        run: bats test/ghostty-settings.bats
